name: CodeQL

# Semantic code scanning (free for public repos). The framework is mostly
# markdown + shell — CodeQL doesn't analyse bash (that's covered by Semgrep
# r/bash in security-scan.yml) — but it DOES cover:
#   - actions: the GitHub Actions workflows themselves (workflow injection,
#     unpinned actions, excessive token scope)
#
# javascript-typescript was removed from the matrix in #663 because
# site/ moved to me2resh/apexyard-site, leaving no JS/TS source in
# this repo. CodeQL exits 32 with "no files found" when the language
# matrix includes a language with zero source files.
#
# Results surface in the repo's Security > Code scanning tab. #518.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '27 3 * * 1'   # weekly, Monday 03:27 UTC

# Least-privilege (#819 / Scorecard Token-Permissions #59): keep the
# top-level block read-only. security-events:write is only granted at job
# level below — Scorecard's topLevelPermissions probe flags any write scope
# declared at workflow level, regardless of job-level scoping.
permissions:
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required to upload CodeQL results
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:${{ matrix.language }}"
