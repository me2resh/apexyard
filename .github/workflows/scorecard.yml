name: Scorecard supply-chain security

# OSSF Scorecard — assesses the repo's supply-chain security posture (branch
# protection, token permissions, pinned actions, dangerous workflow patterns,
# etc.) and publishes results to the Security > Code scanning tab. Free for
# public repos; the score also drives the README badge. #518.

on:
  branch_protection_rule:
  schedule:
    - cron: '19 4 * * 1'   # weekly, Monday 04:19 UTC
  push:
    branches: [main]

# Least-privilege (#819 / Scorecard Token-Permissions #61): the top-level
# block must stay read-only — Scorecard's topLevelPermissions probe flags
# ANY write scope declared at workflow level, even when a job scopes back
# down. Elevated scopes belong at job level only (below). id-token isn't
# granted here or at job level because publish_results is false (#679) —
# the OSSF-API publish step that needed it is disabled, so the scope is dead.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    if: github.repository == 'me2resh/apexyard'
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to code-scanning
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false  # disabled: publish step failed the run (#679); SARIF still uploads to code-scanning

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: results.sarif
