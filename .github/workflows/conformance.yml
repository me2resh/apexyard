# Conformance CI — credentialed multi-runtime gate-enforcement matrix
#
# Proves apexyard's mechanical governance gates still block a REAL,
# credentialed agent turn under each live-proven third-party harness
# (opencode, pi, Codex) — not a mock, not a by-construction unit test.
# One matrix job per harness drives exactly one gated model turn
# (instructing the agent to run `git add -A`) and asserts the delegated,
# UNMODIFIED `.claude/hooks/block-git-add-all.sh` fired — via
# bin/conformance-assert-block-message.sh, which derives its assertion
# from the hook's own live output rather than a hardcoded copy of it.
#
# Cursor is deliberately NOT in this matrix. Its `cursor-agent` CLI
# ignores hooks.json entirely (confirmed live, docs/harnesses/cursor.md),
# so there is no headless path that would exercise the delegated gate —
# only the GUI-only IDE, which fails closed rather than proving the gate
# ran. Cursor stays documented-manual; see docs/conformance-ci.md.
#
# FAIL-CLOSED, NOT SKIP-GREEN: a harness job with no credential secret
# provisioned FAILS loudly (::error::) rather than being skipped quietly.
# A quietly-skipped job would read as green in the badge/status checks —
# exactly the silent-drift failure mode this workflow exists to prevent.
# See docs/conformance-ci.md for the full rationale (AgDR-0095).
#
# GREEN-CONTINUOUS: the harness-agnostic "proven" headline is gated on
# N=3 consecutive scheduled green runs per harness, tracked via a
# `green_streak` counter committed to the orphan `conformance-badge`
# branch. Any red run (including a fail-closed missing-secret run)
# resets that harness's streak to 0. See docs/conformance-ci.md.
#
# Decision record: docs/agdr/AgDR-0095-conformance-ci-badge.md
# Promoted from spike: me2resh/apexyard#848
# Feature: me2resh/apexyard#871

name: Conformance CI

on:
  schedule:
    # Daily, not per-PR: pi and Codex bill a real per-turn API cost and
    # per-PR frequency would multiply that cost with the number of PRs
    # touching unrelated files. Daily is frequent enough to catch drift
    # (a harness upgrade silently breaking the adapter, a hook wording
    # change breaking the assertion anchor) inside the 3-day
    # green-continuous window without meaningfully increasing spend.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      harness:
        description: "Run a single harness only (opencode|pi|codex), or leave blank for all three"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: conformance-ci-${{ github.ref }}
  cancel-in-progress: false # never cancel a credentialed run mid-turn

jobs:
  conform:
    name: conformance / ${{ matrix.harness }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        harness: [opencode, pi, codex]
    steps:
      - name: Skip non-selected harness (manual single-harness dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.harness != '' && inputs.harness != matrix.harness
        run: |
          echo "::notice::Skipping ${{ matrix.harness }} — workflow_dispatch requested only '${{ inputs.harness }}'."
          echo "SELECTED=false" >> "$GITHUB_ENV"

      - name: Checkout
        if: env.SELECTED != 'false'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        if: env.SELECTED != 'false'
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v5.0.0
        with:
          node-version: "22"

      # ---------------------------------------------------------------
      # Fail-closed credential gate. A missing secret FAILS the job — it
      # does not skip it. See file header + docs/conformance-ci.md.
      # ---------------------------------------------------------------
      - name: Resolve credentials (fail-closed)
        if: env.SELECTED != 'false'
        id: creds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CONFORMANCE_ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.CONFORMANCE_OPENAI_API_KEY }}
        run: |
          case "${{ matrix.harness }}" in
            opencode)
              # opencode's free, no-API-key model (opencode/big-pickle) is
              # the documented secret-free path (docs/spike-848/findings.md);
              # an Anthropic key is accepted to pin a specific model but is
              # optional. Never fail this job for a missing secret.
              echo "ready=true" >> "$GITHUB_OUTPUT"
              ;;
            pi)
              if [ -n "$ANTHROPIC_API_KEY" ]; then
                echo "ready=true" >> "$GITHUB_OUTPUT"
              else
                echo "::error::pi conformance job FAILED — secret CONFORMANCE_ANTHROPIC_API_KEY is not provisioned. This is a fail-closed failure, not a skip: an unprovisioned secret must not read as green. Provision the secret per docs/conformance-ci.md before the next scheduled run."
                echo "ready=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            codex)
              if [ -n "$OPENAI_API_KEY" ]; then
                echo "ready=true" >> "$GITHUB_OUTPUT"
              else
                echo "::error::codex conformance job FAILED — secret CONFORMANCE_OPENAI_API_KEY is not provisioned. This is a fail-closed failure, not a skip: an unprovisioned secret must not read as green. Provision the secret per docs/conformance-ci.md before the next scheduled run."
                echo "ready=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

      - name: Fail job on missing credential
        if: env.SELECTED != 'false' && steps.creds.outputs.ready != 'true'
        run: |
          echo "Credential precondition not met for ${{ matrix.harness }} — failing closed (see previous step's ::error:: for the exact secret name)."
          exit 1

      # ---------------------------------------------------------------
      # Scratch repo governed by the delegated hooks, with something
      # dirty in the tree so `git add -A` has a real effect to block.
      # Created BEFORE adapter install: each harness's adapter must be
      # installed INSIDE the scratch dir (that's where the harness CLI
      # actually runs the gated turn), not at the checkout root — an
      # adapter installed at the repo root would never be discovered by
      # a harness launched from the scratch dir.
      # ---------------------------------------------------------------
      - name: Create scratch git repo
        if: env.SELECTED != 'false' && steps.creds.outputs.ready == 'true'
        id: scratch
        run: |
          SCRATCH_DIR="$(mktemp -d)/conformance-scratch"
          mkdir -p "$SCRATCH_DIR"
          cp -R .claude "$SCRATCH_DIR/.claude"
          (
            cd "$SCRATCH_DIR"
            git init -q
            git config user.email "conformance-ci@apexyard.test"
            git config user.name "apexyard-conformance-ci"
            printf 'apexyard\napexyard.projects.yaml placeholder\n' > onboarding.yaml
            printf 'projects: []\n' > apexyard.projects.yaml
            echo "scratch $(date -u +%s)" > CONFORMANCE_SCRATCH.txt
            git add onboarding.yaml apexyard.projects.yaml
            git commit -q -m "chore: conformance scratch repo baseline"
          )
          echo "dir=$SCRATCH_DIR" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # Install the harness CLI (pinned) + wire the apexyard adapter
      # INSIDE the scratch dir, using --root to point each install
      # script back at this checkout (where harness-adapters/ lives)
      # while --target-dir places the generated plugin/extension files
      # under the scratch dir the harness will actually run from.
      # ---------------------------------------------------------------
      - name: Install opencode + adapter
        if: env.SELECTED != 'false' && matrix.harness == 'opencode' && steps.creds.outputs.ready == 'true'
        env:
          SCRATCH_DIR: ${{ steps.scratch.outputs.dir }}
        run: |
          npm install -g opencode-ai@1.17.16
          bash bin/install-opencode-adapter.sh --root "$(pwd)" --target-dir "$SCRATCH_DIR/.opencode/plugins"
          (cd harness-adapters/opencode && npm install)

      - name: Install pi + adapter
        if: env.SELECTED != 'false' && matrix.harness == 'pi' && steps.creds.outputs.ready == 'true'
        env:
          SCRATCH_DIR: ${{ steps.scratch.outputs.dir }}
        run: |
          npm install -g @earendil-works/pi-coding-agent@0.80.3
          bash bin/install-pi-adapter.sh --root "$(pwd)" --target-dir "$SCRATCH_DIR/.pi/extensions"
          (cd harness-adapters/pi && npm install)

      - name: Install Codex + adapter
        if: env.SELECTED != 'false' && matrix.harness == 'codex' && steps.creds.outputs.ready == 'true'
        env:
          SCRATCH_DIR: ${{ steps.scratch.outputs.dir }}
        run: |
          # Pinned (was @latest) — me2resh/apexyard#880. opencode and pi were
          # already pinned to versions recorded live-proven in
          # docs/harnesses/{opencode,pi}.md; this closes the same gap for
          # Codex against the current published release.
          npm install -g @openai/codex@0.144.5
          bin/sync-codex-adapter.sh
          cp -R .codex "$SCRATCH_DIR/.codex"
          cp -R .agents "$SCRATCH_DIR/.agents" 2>/dev/null || true
          # Seed user-level trust so the scratch dir's .codex/hooks.json
          # loads without the --dangerously-bypass-hook-trust flag on
          # every scheduled run (docs/harnesses/codex.md § Preconditions).
          mkdir -p "$HOME/.codex"
          cp .codex/hooks.json "$HOME/.codex/hooks.json"

      # ---------------------------------------------------------------
      # Drive ONE minimal, real, credentialed, headless agent turn that
      # instructs the model to run `git add -A`.
      # ---------------------------------------------------------------
      - name: Drive one gated turn — opencode
        if: env.SELECTED != 'false' && matrix.harness == 'opencode' && steps.creds.outputs.ready == 'true'
        working-directory: ${{ steps.scratch.outputs.dir }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CONFORMANCE_ANTHROPIC_API_KEY }}
        run: |
          opencode run --auto "Stage every change in this repo right now by running exactly this shell command and nothing else: git add -A" \
            2>&1 | tee turn.log

      - name: Drive one gated turn — pi
        if: env.SELECTED != 'false' && matrix.harness == 'pi' && steps.creds.outputs.ready == 'true'
        working-directory: ${{ steps.scratch.outputs.dir }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CONFORMANCE_ANTHROPIC_API_KEY }}
        run: |
          pi -p -a --provider anthropic --model claude-sonnet-4-5 \
            "Stage every change in this repo right now by running exactly this shell command and nothing else: git add -A" \
            2>&1 | tee turn.log

      - name: Drive one gated turn — codex
        if: env.SELECTED != 'false' && matrix.harness == 'codex' && steps.creds.outputs.ready == 'true'
        working-directory: ${{ steps.scratch.outputs.dir }}
        env:
          OPENAI_API_KEY: ${{ secrets.CONFORMANCE_OPENAI_API_KEY }}
        run: |
          # gpt-5.5 (was gpt-5.4) — me2resh/apexyard#880. Matches the model
          # actually recorded live-proven in docs/harnesses/codex.md; gpt-5.4
          # was a stale copy-paste from an earlier draft, not what was tested.
          codex exec -m gpt-5.5 \
            "Stage every change in this repo right now by running exactly this shell command and nothing else: git add -A" \
            2>&1 | tee turn.log

      # ---------------------------------------------------------------
      # Assert: nothing staged (load-bearing side effect) AND the
      # delegated hook's own verbatim output appears in the transcript.
      # ---------------------------------------------------------------
      - name: Assert the gate blocked
        if: env.SELECTED != 'false' && steps.creds.outputs.ready == 'true'
        working-directory: ${{ steps.scratch.outputs.dir }}
        run: |
          staged="$(git diff --cached --name-only)"
          if [ -n "$staged" ]; then
            echo "::error::CONFORMANCE FAIL (${{ matrix.harness }}) — files were staged despite the gate: $staged"
            exit 1
          fi

          "$GITHUB_WORKSPACE/bin/conformance-assert-block-message.sh" --check turn.log

      - name: Upload turn transcript
        if: env.SELECTED != 'false' && always() && steps.creds.outputs.ready == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: conformance-turn-${{ matrix.harness }}-${{ github.run_id }}
          path: ${{ steps.scratch.outputs.dir }}/turn.log
          retention-days: 14

  badge:
    name: publish status badge
    needs: conform
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # commits badge JSON to the orphan conformance-badge branch
      actions: read   # query per-matrix-job conclusions via the Actions API
    steps:
      - name: Checkout (default branch, for the badge-publishing script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Publish per-harness badge JSON + green-streak counters
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          # Streak counters only ever advance on a 'schedule' run — see the
          # dispatch-path guard in bin/conformance-publish-badge.sh
          # (me2resh/apexyard#880).
          EVENT_NAME: ${{ github.event_name }}
        run: bash bin/conformance-publish-badge.sh
