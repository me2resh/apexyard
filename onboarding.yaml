# =============================================================================
# ApexYard Onboarding Configuration — Beeking Etman
# =============================================================================
# Configured 2026-06-04 via /setup pre-fill (foundation.md + README.md).
# Bootstrap: beeking-etman registered as P0, single-fork mode (public repo).
# LSP: enabled — typescript-language-server (cores=4, ram=11GB).
# =============================================================================

# -----------------------------------------------------------------------------
# Company Information
# -----------------------------------------------------------------------------
company:
  name: "Beeking Etman"
  mission: "Production-grade Arabic-first e-commerce platform for the Egyptian market — self-hosted, commerce-first, fully owned by the project."
  vision: "Be the go-to commerce platform serving Arabic-speaking markets with self-hosted, customizable, commerce-first infrastructure."
  website: "https://github.com/zeyadsleem/beeking-etman"   # product repo; production URL TBD

  values:
    - "Quality over speed"
    - "Ship and learn"
    - "Keep it simple"
    - "Commerce comes from Medusa — never reinvent the wheel"
    - "Reuse before build"

  products:
    - name: "Beeking Etman Storefront"
      description: "Arabic-first e-commerce storefront — Next.js + Medusa backend, EGP pricing, Egyptian shipping, Paymob + COD"
      type: "web-app"

# -----------------------------------------------------------------------------
# Team Structure
# -----------------------------------------------------------------------------
team:
  - name: "Zeyad Sleem"
    role: "tech-lead"
    department: "engineering"
  # Roles planned (no named owners yet — register owners as team grows):
  #   backend-engineer   — Medusa + Paymob + shipping integrations
  #   frontend-engineer  — Next.js + RTL + design system
  #   qa-engineer        — E2E checkout, payment regression
  #   platform-engineer  — Docker, Nginx, self-hosted infra
  #   ui-designer        — Arabic UX, RTL
  #   security-auditor   — payments, PCI, webhooks

# -----------------------------------------------------------------------------
# Tech Stack
# -----------------------------------------------------------------------------
tech_stack:
  language: "TypeScript"
  runtime: "Node.js"
  framework: "Next.js"                   # App Router, based on Blazity/next-enterprise
  backend: "Medusa"                     # self-hosted commerce engine
  database: "PostgreSQL"
  hosting: "Self-hosted (Ubuntu + Docker + Nginx + SSL)"
  ci_cd: "GitHub Actions"
  testing: "Vitest"
  e2e_testing: "Playwright"
  orm: "Prisma"                         # app code only; Medusa owns its own data layer
  state_management: "TanStack Query"
  styling: "Tailwind CSS"
  api_style: "REST"                     # Medusa Store API
  iac: "Docker Compose"                 # v1; Terraform later if/when infra scales

# -----------------------------------------------------------------------------
# Project Management
# -----------------------------------------------------------------------------
project_management:
  tool: "GitHub Issues"
  sprint_duration: "1 week"
  branching_strategy: "feature-branch"
  ticket_prefix: "GH"

# -----------------------------------------------------------------------------
# Quality Standards
# -----------------------------------------------------------------------------
quality:
  test_coverage_target: 80
  required_reviews: 1
  required_checks:
    - lint
    - typecheck
    - test
    - build
  review_style: "thorough"

# -----------------------------------------------------------------------------
# Workflows
# -----------------------------------------------------------------------------
workflows:
  require_prd: true
  require_technical_design: true
  require_qa_signoff: true
  require_security_review: true        # payments + webhooks in v1
  use_feature_flags: false
  use_agent_decision_records: true

# -----------------------------------------------------------------------------
# Communication
# -----------------------------------------------------------------------------
communication:
  primary: "TBD"
  documentation: "GitHub Wiki"
  design: "Figma"
