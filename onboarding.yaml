# =============================================================================
# ApexYard Onboarding Configuration
# =============================================================================
#
# Fill in this file to customize ApexYard for your team.
# Claude Code reads this file to understand your company context.
#
# After editing, commit this file to your repo. Claude Code will use it
# to tailor its behavior to your team's structure and processes.
#

# -----------------------------------------------------------------------------
# ApexYard Setup
# -----------------------------------------------------------------------------
# ApexYard governs a PORTFOLIO of repos as one organisation. The repo this
# file lives in is your "ops repo" — ApexYard itself, forked from
# me2resh/apexyard. A registry file (apexyard.projects.yaml) lists every
# managed project. Skills like /projects, /inbox, /status, /tasks aggregate
# across the registry. Per-project docs live in projects/<name>/, and live
# working copies (optional) live in workspace/<name>/.
#
# Built for CTOs, engineering leads, and Chief-of-Staff roles managing a
# portfolio of 2+ repos. If you have exactly one repo, you can still fork
# apexyard and register a single project — the skills work the same way.
#
# See docs/setup.md for the full guide.

# -----------------------------------------------------------------------------
# Company Information
# -----------------------------------------------------------------------------
company:
  name: "marsa-cloud"
  mission: "Build an open-source, self-hostable PaaS that gives developers a Heroku/Railway-style experience on their own Kubernetes infrastructure."
  vision: "A simple, no-lock-in developer platform that makes self-hosting applications as easy as a managed cloud."
  website: "https://github.com/marsa-cloud"

  # Core values that guide decision-making
  values:
    - "Open-source core, no vendor lock-in"
    - "Simple developer experience"
    - "Self-hostable by default"
    - "Lead with ecosystem best practice"

  # What kind of software you build
  products:
    - name: "Marsa"
      description: "Self-hostable Platform as a Service (PaaS) that deploys and manages applications on Kubernetes (K3s)."
      type: "saas"  # web-app, mobile-app, api, cli, library, saas

# -----------------------------------------------------------------------------
# Team Structure
# -----------------------------------------------------------------------------
# List your team members and their roles.
# Roles should match filenames in roles/ (e.g., "tech-lead" -> roles/engineering/tech-lead.md)
#
# Available roles:
#   Engineering: head-of-engineering, tech-lead, backend-engineer, frontend-engineer,
#                qa-engineer, platform-engineer, sre
#   Product:     head-of-product, product-manager, product-analyst
#   Design:      head-of-design, ui-designer, ux-designer
#   Security:    head-of-security, security-auditor, penetration-tester
#   Data:        head-of-data, data-analyst, data-engineer
#
team:
  - name: "Mohammad Gomaa"
    role: "tech-lead"
    department: "engineering"

  # Solo project today. Uncomment and add more team members as the team grows:
  # - name: "Developer"
  #   role: "backend-engineer"
  #   department: "engineering"
  #
  # - name: "PM"
  #   role: "product-manager"
  #   department: "product"

# -----------------------------------------------------------------------------
# Tech Stack
# -----------------------------------------------------------------------------
# Define your technology choices. This helps Claude Code give relevant advice.
#
tech_stack:
  language: "TypeScript"          # Primary language
  runtime: "Node.js"              # Runtime environment
  framework: "Nuxt 4 (Vue 3)"     # Frontend framework (React, Vue, Svelte, etc.)
  backend: "NestJS 11 on Fastify" # Backend framework (Express, Fastify, NestJS, etc.)
  database: "PostgreSQL"          # Primary database
  hosting: "Kubernetes (K3s), self-hosted"  # Cloud provider (AWS, GCP, Azure, Vercel, etc.)
  ci_cd: "GitHub Actions"         # CI/CD platform
  testing: "Vitest"               # Test framework
  e2e_testing: "Playwright"       # E2E test framework

  # Additional tools (uncomment what you use):
  orm: "MikroORM"
  ui_library: "Nuxt UI"
  styling: "Tailwind CSS 4"
  api_style: "REST"             # REST, GraphQL, gRPC; OpenAPI is the single source of truth
  package_manager: "pnpm (monorepo, catalog)"
  runtime_orchestration: "Kubernetes (K3s)"
  # iac: "Terraform"              # Infrastructure as Code tool
  # monitoring: "Datadog"
  # error_tracking: "Sentry"

# -----------------------------------------------------------------------------
# Project Management
# -----------------------------------------------------------------------------
project_management:
  tool: "GitHub Issues"           # GitHub Issues, Linear, Jira, etc.
  sprint_duration: "1 week"       # Sprint/cycle length
  branching_strategy: "feature-branch"  # feature-branch, gitflow, trunk-based

  # Ticket ID prefix (used in branch names and PR titles)
  # Examples: "GH" for GitHub Issues (#42), "PROJ" for Jira (PROJ-42)
  ticket_prefix: "GH"

# -----------------------------------------------------------------------------
# Quality Standards
# -----------------------------------------------------------------------------
quality:
  # Minimum test coverage percentage
  test_coverage_target: 80

  # Required approvals before merge
  required_reviews: 1

  # Enforce these checks before merge
  required_checks:
    - lint
    - typecheck
    - test
    - build

  # Code review style
  review_style: "thorough"        # thorough, lightweight, pair-programming

# -----------------------------------------------------------------------------
# Workflows
# -----------------------------------------------------------------------------
# Enable or disable workflow stages.
# Set to false to skip stages that don't apply to your team.
#
workflows:
  require_prd: true               # Require PRD before development
  require_technical_design: true   # Require tech design before coding
  require_qa_signoff: true         # Require QA verification before Done
  require_security_review: false   # Require security review before launch
  use_feature_flags: false         # Use feature flags for rollouts
  use_agent_decision_records: true # Track AI agent decisions

# -----------------------------------------------------------------------------
# Communication
# -----------------------------------------------------------------------------
# Where your team communicates (helps Claude know where to suggest updates)
#
communication:
  primary: "GitHub (issues / PRs)"   # Slack, Discord, Teams, etc.
  documentation: "In-repo docs/ + CLAUDE.md + GitHub"  # GitHub Wiki, Notion, Confluence, etc.
  design: "code-first (Nuxt UI)"     # Figma, Sketch, code-first, etc.
